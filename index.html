<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E Name Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <div class="brand-rail" aria-hidden="true"></div>

    <img src="images/company_logo.png" class="company-logo" alt="Seng Li">
    
    <img id="photo" alt="">

    <h1 id="name"></h1>

    <h3 id="title"></h3>

    <p id="company"></p>

    <p class="registration-no">201001040122 (924047-P)</p>

    <div class="card-link-wrap">
        <span id="cardUrl"></span>
        <button id="copyLinkBtn" type="button">Copy Link</button>
    </div>
    
    <a id="callBtn">📞 Call</a>

    <a id="waBtn">💬 WhatsApp</a>

    <a id="emailBtn">✉ Email</a>

    <a id="websiteBtn">🌐 Website</a>

    <a id="contactBtn">➕ Add Contact</a>

    <details class="company-info">
        <summary>Company Info</summary>
        <p>
            <span class="info-label">HQ:</span>
            16 &amp; 16a, Jalan Firma 2/1, Kawasan Perindustrian Tebrau 1,
            81100 Johor Bahru, Johor, Malaysia.
        </p>
        <p><span class="info-label">Tel:</span> 07-361 6565</p>
        <p><span class="info-label">Fax:</span> 07-361 5373</p>
    </details>

</div>

<script src="script.js"></script>

</body>
</html>
